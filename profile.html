<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Profil | YouthMarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: white; overflow-x: hidden; }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text; 
            -webkit-text-fill-color: transparent;
        }
        .profile-glow {
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="fixed w-full z-50 glass py-4 px-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold gradient-text">YouthMarket.</h1>
        <div class="hidden md:flex space-x-8 text-sm font-medium">
            <a href="pembeli.html" class="hover:text-blue-400 transition">Beranda</a>
            <a href="seller.html" class="hover:text-blue-400 transition">Dashboard Seller</a>
            <button onclick="logout()" class="text-red-400 hover:text-red-300 transition">Keluar</button>
        </div>
    </nav>

    <!-- Hero / Profile Header -->
    <section class="min-h-screen flex flex-col justify-center items-center text-center px-4">
        <div data-aos="zoom-out">
            <!-- Avatar Upload Wrapper -->
            <div class="relative w-32 h-32 md:w-40 md:h-40 mx-auto mb-8 group cursor-pointer" onclick="document.getElementById('avatar-input').click()">
                <div class="absolute inset-0 bg-blue-500 rounded-full blur-2xl opacity-20 animate-pulse"></div>
                <img id="main-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky" alt="Profile" class="relative w-full h-full rounded-full border-4 border-blue-500 shadow-2xl object-cover profile-glow transition group-hover:brightness-50">
                
                <!-- Overlay Kamera -->
                <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300">
                    <i class="fas fa-camera text-3xl text-white"></i>
                </div>
                <input type="file" id="avatar-input" class="hidden" accept="image/*">
            </div>

            <h1 class="text-4xl md:text-6xl font-bold mb-2">
                Halo, <span id="user-name-display" class="gradient-text">Pengguna</span>!
            </h1>
            <p id="user-email-display" class="text-gray-400 mb-8 italic">email@kamu.com</p>
            
            <a href="#settings" class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-full font-semibold transition transform hover:scale-105 inline-block">
                Pengaturan Akun
            </a>
        </div>
    </section>

    <!-- Settings Section -->
    <section id="settings" class="py-20 px-6 max-w-4xl mx-auto">
        <div class="glass p-8 md:p-12 rounded-[40px]" data-aos="fade-up">
            <h3 class="text-2xl font-bold mb-10 flex items-center gap-3">
                <i class="fas fa-shield-halved text-blue-400"></i> Keamanan & Profil
            </h3>
            
            <form id="updateAccountForm" class="space-y-8">
                <!-- Info Dasar -->
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-400 ml-2 tracking-widest">NAMA PENGGUNA</label>
                        <input type="text" id="edit-username" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl focus:border-blue-500 outline-none transition">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-400 ml-2 tracking-widest">EMAIL</label>
                        <input type="email" id="edit-email" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl opacity-50 cursor-not-allowed" disabled>
                    </div>
                </div>

                <hr class="border-white/10">

                <!-- Verifikasi Password 2 Langkah -->
                <div class="space-y-6">
                    <h4 class="text-sm font-bold text-blue-400 italic">Ubah Kata Sandi (Verifikasi Diperlukan)</h4>
                    
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-400 ml-2 tracking-widest uppercase">Kata Sandi Lama</label>
                        <div class="relative">
                            <i class="fas fa-key absolute left-4 top-4 text-gray-500"></i>
                            <input type="password" id="old-password" placeholder="Masukkan sandi saat ini" class="w-full pl-12 pr-4 py-4 bg-white/5 border border-white/10 rounded-2xl focus:border-red-500 outline-none transition">
                        </div>
                        <p class="text-[10px] text-gray-500 ml-2">*Wajib diisi jika ingin mengganti nama atau password baru.</p>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-400 ml-2 tracking-widest uppercase">Kata Sandi Baru</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-4 text-gray-500"></i>
                            <input type="password" id="new-password" placeholder="Biarkan kosong jika tidak ingin diubah" class="w-full pl-12 pr-4 py-4 bg-white/5 border border-white/10 rounded-2xl focus:border-blue-500 outline-none transition">
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 py-4 rounded-2xl font-bold hover:shadow-lg hover:shadow-blue-500/20 transition transform active:scale-95">
                    Konfirmasi & Simpan Perubahan
                </button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-10 text-center text-gray-600 text-xs">
        &copy; 2024 YouthMarket. Sistem Keamanan Terenkripsi Local.
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) window.location.href = 'auth.html';

        // Load Data Awal
        window.onload = () => {
            document.getElementById('user-name-display').innerText = currentUser.username;
            document.getElementById('user-email-display').innerText = currentUser.email;
            document.getElementById('edit-username').value = currentUser.username;
            document.getElementById('edit-email').value = currentUser.email;
            
            // Load Foto Profil jika ada
            if(currentUser.profilePic) {
                document.getElementById('main-avatar').src = currentUser.profilePic;
            }
        };

        // --- FITUR GANTI FOTO PROFIL ---
        const avatarInput = document.getElementById('avatar-input');
        avatarInput.onchange = function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64 = e.target.result;
                    document.getElementById('main-avatar').src = base64;
                    
                    // Simpan ke currentUser & Database Users
                    updateUserInStorage('profilePic', base64);
                    alert('Foto profil berhasil diperbarui!');
                };
                reader.readAsDataURL(file);
            }
        };

        // --- FITUR UPDATE DATA DENGAN VERIFIKASI PASSWORD LAMA ---
        document.getElementById('updateAccountForm').onsubmit = function(e) {
            e.preventDefault();
            
            const oldPassInput = document.getElementById('old-password').value;
            const newName = document.getElementById('edit-username').value;
            const newPass = document.getElementById('new-password').value;

            // VERIFIKASI: Harus memasukkan password lama yang benar
            if (oldPassInput !== currentUser.password) {
                alert('GAGAL: Kata sandi lama yang Anda masukkan salah!');
                document.getElementById('old-password').classList.add('border-red-500');
                return;
            }

            // Jika verifikasi lolos
            updateUserInStorage('username', newName);
            if(newPass) {
                updateUserInStorage('password', newPass);
            }

            alert('Data berhasil diperbarui!');
            location.reload();
        };

        // Helper untuk update data di kedua tempat (currentUser & list users)
        function updateUserInStorage(key, value) {
            // 1. Update Current Session
            currentUser[key] = value;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));

            // 2. Update di Database User Lengkap
            let users = JSON.parse(localStorage.getItem('users')) || [];
            const index = users.findIndex(u => u.email === currentUser.email);
            if(index !== -1) {
                users[index][key] = value;
                localStorage.setItem('users', JSON.stringify(users));
            }
        }

        function logout() {
            if(confirm('Keluar dari akun?')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
