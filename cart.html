<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Belanja - YouthMarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">

    <!-- NAVBAR -->
    <nav class="bg-white shadow-sm sticky top-0 z-50 py-4 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <a href="pembeli.html" class="text-2xl font-bold text-indigo-600">YouthMarket.</a>
            <!-- DITAMBAHKAN ID: txt-cart-title -->
            <h2 id="txt-cart-title" class="text-lg font-bold text-gray-700 italic">Keranjang Belanja</h2>
            <a href="pembeli.html" class="text-gray-500 hover:text-indigo-600"><i class="fas fa-times text-xl"></i></a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10 max-w-5xl">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- LIST BARANG -->
            <div class="lg:w-2/3 space-y-4" id="cart-list">
                <!-- Barang keranjang muncul di sini -->
            </div>

            <!-- RINGKASAN BELANJA -->
            <div class="lg:w-1/3">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 sticky top-24">
                    <!-- DITAMBAHKAN ID: txt-summary-title -->
                    <h3 id="txt-summary-title" class="text-lg font-bold mb-4">Ringkasan Belanja</h3>
                    <div class="space-y-3 pb-4 border-b border-gray-50">
                        <div class="flex justify-between text-gray-500 text-sm">
                            <!-- DITAMBAHKAN ID: txt-selected-label -->
                            <span id="txt-selected-label">Total Barang dipilih</span>
                            <span id="selected-count">0</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center py-4">
                        <!-- DITAMBAHKAN ID: txt-total-label -->
                        <span id="txt-total-label" class="font-bold">Total Harga</span>
                        <span class="text-xl font-black text-indigo-600" id="total-price">Rp 0</span>
                    </div>
                    <!-- DITAMBAHKAN ID: btn-checkout-text (untuk teks tombol) -->
                    <button onclick="processCheckout()" id="btn-checkout" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-100 transform active:scale-95 disabled:bg-gray-200">
                        Check Out
                    </button>
                </div>
            </div>

        </div>
    </main>

    <script>
        // --- 1. DATA & TRANSLASI ---
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        const translations = {
            id: {
                cartTitle: "Keranjang Belanja",
                empty: "Keranjangmu masih kosong.",
                startShopping: "Mulai Belanja",
                summary: "Ringkasan Belanja",
                selectedLabel: "Total Barang dipilih",
                totalLabel: "Total Harga",
                checkout: "Check Out",
                confirmDelete: "Hapus barang ini dari keranjang?"
            },
            en: {
                cartTitle: "Shopping Cart",
                empty: "Your cart is empty.",
                startShopping: "Start Shopping",
                summary: "Shopping Summary",
                selectedLabel: "Total items selected",
                totalLabel: "Total Price",
                checkout: "Check Out",
                confirmDelete: "Remove this item from cart?"
            }
        };

        // --- 2. FUNGSI BAHASA ---
        function applyLanguage() {
            const lang = localStorage.getItem('lang') || 'id';
            const t = translations[lang];

            // Update elemen statis
            document.getElementById('txt-cart-title').innerText = t.cartTitle;
            document.getElementById('txt-summary-title').innerText = t.summary;
            document.getElementById('txt-selected-label').innerText = t.selectedLabel;
            document.getElementById('txt-total-label').innerText = t.totalLabel;
            document.getElementById('btn-checkout').innerText = t.checkout;
            
            // Render ulang keranjang agar pesan "Kosong" juga berubah bahasa
            renderCart();
        }

        // --- 3. FUNGSI KERANJANG ---
        function renderCart() {
            const lang = localStorage.getItem('lang') || 'id';
            const t = translations[lang];
            const list = document.getElementById('cart-list');

            if (cart.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-20 bg-white rounded-3xl border border-dashed border-gray-200">
                        <i class="fas fa-shopping-basket text-5xl text-gray-200 mb-4"></i>
                        <p class="text-gray-400">${t.empty}</p>
                        <a href="pembeli.html" class="text-indigo-600 font-bold mt-2 inline-block">${t.startShopping}</a>
                    </div>`;
                updateSummary();
                return;
            }

            list.innerHTML = cart.map((item, index) => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 group">
                    <input type="checkbox" ${item.selected ? 'checked' : ''} 
                           onchange="toggleSelect(${index})"
                           class="w-5 h-5 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                    
                    <img src="${item.image}" class="w-20 h-20 rounded-xl object-cover">
                    
                    <div class="flex-1">
                        <h4 class="font-bold text-gray-800">${item.name}</h4>
                        <p class="text-indigo-600 font-black text-sm">Rp ${parseInt(item.price).toLocaleString()}</p>
                    </div>

                    <div class="flex items-center gap-3 bg-gray-50 px-3 py-1 rounded-xl">
                        <button onclick="updateQty(${index}, -1)" class="text-gray-400 hover:text-indigo-600"><i class="fas fa-minus-circle text-sm"></i></button>
                        <span class="font-bold text-sm w-5 text-center">${item.qty}</span>
                        <button onclick="updateQty(${index}, 1)" class="text-gray-400 hover:text-indigo-600"><i class="fas fa-plus-circle text-sm"></i></button>
                    </div>

                    <button onclick="removeItem(${index})" class="text-gray-300 hover:text-red-500 transition px-2">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');

            updateSummary();
        }

        function toggleSelect(index) {
            cart[index].selected = !cart[index].selected;
            saveCart();
        }

        function updateQty(index, change) {
            cart[index].qty += change;
            if (cart[index].qty < 1) cart[index].qty = 1;
            saveCart();
        }

        function removeItem(index) {
            const lang = localStorage.getItem('lang') || 'id';
            if(confirm(translations[lang].confirmDelete)) {
                cart.splice(index, 1);
                saveCart();
            }
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function updateSummary() {
            const selectedItems = cart.filter(item => item.selected);
            const total = selectedItems.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            document.getElementById('selected-count').innerText = selectedItems.length;
            document.getElementById('total-price').innerText = `Rp ${total.toLocaleString()}`;
            document.getElementById('btn-checkout').disabled = selectedItems.length === 0;
        }

        function processCheckout() {
            const lang = localStorage.getItem('lang') || 'id';
            const msg = lang === 'id' ? 'Fitur Checkout segera hadir!' : 'Checkout feature coming soon!';
            alert(msg);
        }

        // --- 4. INISIALISASI ---
        window.onload = () => {
            applyLanguage(); // applyLanguage akan memanggil renderCart() di dalamnya
        };
    </script>
</body>
</html>
