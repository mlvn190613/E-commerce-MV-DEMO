<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLVN_ TUMBAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">

<!-- Navbar -->
<nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
        <!-- Sisi Kiri: Logo -->
        <h1 class="text-2xl font-bold text-indigo-600">YouthMarket.</h1>
        
        <!-- Sisi Kanan: Navigasi Menu -->
        <div class="flex items-center space-x-4 md:space-x-6">
            
        <!-- 1. Language Switcher (DIPERBAIKI) -->
        <div class="relative group cursor-pointer border-r pr-4 md:pr-6 border-gray-100 py-2">
        <!-- Trigger -->
        <div id="current-lang" class="flex items-center gap-2 text-sm font-bold text-gray-700">
            <img id="flag-icon" src="https://flagcdn.com/w20/id.png" class="w-5 shadow-sm">
            <span id="lang-text" class="hidden sm:inline">Indonesia</span>
            <i class="fas fa-chevron-down text-[10px] transition-transform group-hover:rotate-180"></i>
        </div>

        <!-- Dropdown Menu dengan 'Bridge' (Jembatan Transparan) -->
        <!-- Kita menggunakan 'top-full' dan 'pt-2' agar tidak ada celah kosong -->
        <div class="absolute right-0 top-full pt-2 w-32 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
            <div class="bg-white rounded-xl shadow-xl border border-gray-100 overflow-hidden">
                <button onclick="changeLanguage('id')" class="w-full px-4 py-3 text-left text-sm hover:bg-indigo-50 flex items-center gap-2 transition">
                    <img src="https://flagcdn.com/w20/id.png" class="w-4"> Indonesia
                </button>
                <button onclick="changeLanguage('en')" class="w-full px-4 py-3 text-left text-sm hover:bg-indigo-50 flex items-center gap-2 transition border-t border-gray-50">
                   <img src="https://flagcdn.com/w20/gb.png" class="w-4"> EN
                    </button>
                </div>
            </div>
        </div>

            <!-- 2. Tombol Mulai Jualan -->
            <a href="seller.html" id="btn-sell" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-100 hidden sm:block">
                Mulai Jualan
            </a>

            <!-- 3. Navigasi Profil (Sisi Paling Kanan) -->
            <div id="nav-account-section" class="flex items-center">
                <!-- Tombol Login (Muncul jika belum login) -->
                <a href="auth.html" id="btn-login-ui" class="text-gray-700 font-bold hover:text-indigo-600 transition px-4 py-2 text-sm">Masuk</a>
                
                <!-- Info Akun (Muncul jika sudah login) -->
                <div id="user-info-ui" class="hidden relative group py-2"> 
                    <div class="flex items-center gap-3 cursor-pointer ml-2">
                        <div class="text-right hidden lg:block">
                            <p class="text-[9px] text-indigo-400 font-black uppercase tracking-widest leading-none mb-1">Akun Saya</p>
                            <p id="display-username" class="text-sm font-extrabold text-gray-800 leading-none">Nama User</p>
                        </div>
                        
                        <!-- Wadah Foto Profil Navbar -->
                        <div id="navbar-profile-img" class="w-10 h-10 rounded-full bg-indigo-50 flex items-center justify-center overflow-hidden border-2 border-transparent group-hover:border-indigo-600 transition shadow-sm">
                            <i class="fas fa-user text-indigo-600"></i>
                        </div>
                    </div>
                    
                    <!-- Dropdown Menu -->
                    <div class="absolute right-0 top-full pt-2 w-52 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-[100]">
                        <div class="bg-white shadow-2xl border border-gray-100 rounded-2xl overflow-hidden">
                            <div class="bg-gray-50 p-4 border-b border-gray-100">
                                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Manajemen</p>
                            </div>
                            <a href="profile.html" class="flex items-center gap-3 px-5 py-3 text-sm text-gray-600 hover:bg-indigo-600 hover:text-white transition">
                                <i class="fas fa-user-circle w-5"></i> Profil Saya
                            </a>
                            <a href="seller.html" class="flex items-center gap-3 px-5 py-3 text-sm text-gray-600 hover:bg-indigo-600 hover:text-white transition">
                                <i class="fas fa-store w-5"></i> Dashboard Seller
                            </a>
                            <div class="border-t border-gray-50">
                                <button onclick="logout()" class="flex items-center gap-3 w-full text-left px-5 py-3 text-sm text-red-500 hover:bg-red-50 transition">
                                    <i class="fas fa-sign-out-alt w-5"></i> Keluar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</nav>

    <!-- Hero Section -->
    <header class="bg-indigo-600 py-16 text-center text-white">
        <h2 class="text-4xl md:text-5xl font-extrabold mb-4">Cari Barang Favoritmu!</h2>
        <p class="text-indigo-100">Tempat anak muda kreatif jual-beli barang berkualitas.</p>
    </header>

    <!-- Product Grid -->
    <main class="container mx-auto px-6 py-12">
        <h3 class="text-2xl font-bold text-gray-800 mb-8 italic border-l-4 border-indigo-600 pl-4">Produk Terbaru</h3>
        
        <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Produk akan muncul di sini secara dinamis -->
        </div>

        <!-- Jika kosong -->
        <div id="empty-state" class="hidden text-center py-20">
            <i class="fas fa-box-open text-6xl text-gray-300 mb-4"></i>
            <p class="text-gray-500">Belum ada produk. Jadilah penjual pertama!</p>
        </div>
    </main>

    <script>
        function checkLogin() {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    const btnLogin = document.getElementById('btn-login-ui');
    const userInfo = document.getElementById('user-info-ui');
    const displayUsername = document.getElementById('display-username');
    const profileImgContainer = document.getElementById('navbar-profile-img');

    if (currentUser) {
        // 1. Tampilkan area User Info, sembunyikan tombol login
        if(btnLogin) btnLogin.classList.add('hidden');
        if(userInfo) userInfo.classList.remove('hidden');
        
        // 2. Tampilkan Nama
        if(displayUsername) displayUsername.innerText = currentUser.username;
        
        // 3. LOGIKA FOTO PROFIL: Cek apakah user punya foto profil
        if (currentUser.profilePic) {
            // Jika ada foto, ganti Icon dengan <img>
            profileImgContainer.innerHTML = `<img src="${currentUser.profilePic}" class="w-full h-full object-cover">`;
        } else {
            // Jika tidak ada, gunakan icon default
            profileImgContainer.innerHTML = `<i class="fas fa-user text-indigo-600"></i>`;
        }

    } else {
        // Jika belum login
        if(btnLogin) btnLogin.classList.remove('hidden');
        if(userInfo) userInfo.classList.add('hidden');
    }
}

// Pastikan fungsi ini dipanggil saat halaman selesai dimuat
window.addEventListener('DOMContentLoaded', checkLogin);

    function loadProducts() {
            const productList = document.getElementById('product-list');
            const emptyState = document.getElementById('empty-state');
            const products = JSON.parse(localStorage.getItem('products')) || [];

            if (products.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }

            productList.innerHTML = products.map(product => `
                <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-shadow duration-300 overflow-hidden border border-gray-100 group">
                    <div class="relative overflow-hidden">
                        <img src="${product.image}" alt="${product.name}" class="w-full h-56 object-cover transform group-hover:scale-110 transition duration-500">
                        <span class="absolute top-3 left-3 bg-white/90 backdrop-blur-sm text-indigo-600 text-xs font-bold px-3 py-1 rounded-full uppercase">
                            ${product.category}
                        </span>
                    </div>
                    <div class="p-5">
                        <h4 class="text-lg font-bold text-gray-800 mb-1">${product.name}</h4>
                        <p class="text-indigo-600 font-extrabold text-xl mb-4">Rp ${parseInt(product.price).toLocaleString('id-ID')}</p>
                        <button class="w-full bg-gray-900 text-white py-3 rounded-xl font-semibold hover:bg-indigo-600 transition duration-300 flex items-center justify-center gap-2">
                            <i class="fas fa-shopping-cart text-sm"></i> Beli Sekarang
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
