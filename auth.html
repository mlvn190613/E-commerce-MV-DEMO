<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Register - YouthMarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4 relative">

    <!-- 1. LANGUAGE SWITCHER (POJOK KANAN ATAS) -->
    <div class="absolute top-6 right-6 z-50">
        <div class="relative group cursor-pointer py-2">
            <!-- Trigger -->
            <div class="flex items-center gap-2 bg-white/20 backdrop-blur-md px-4 py-2 rounded-full border border-white/30 text-white shadow-lg transition hover:bg-white/30">
                <img id="flag-icon" src="https://flagcdn.com/w20/id.png" class="w-4 shadow-sm">
                <span id="lang-text" class="text-xs font-bold uppercase">ID</span>
                <i class="fas fa-chevron-down text-[10px] transition-transform group-hover:rotate-180"></i>
            </div>

            <!-- Dropdown dengan Bridge -->
            <div class="absolute right-0 top-full pt-2 w-32 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300">
                <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
                    <button onclick="changeLanguage('id')" class="w-full px-4 py-3 text-left text-xs font-bold text-gray-700 hover:bg-indigo-50 flex items-center gap-2 transition">
                        <img src="https://flagcdn.com/w20/id.png" class="w-4"> Indonesia
                    </button>
                    <button onclick="changeLanguage('en')" class="w-full px-4 py-3 text-left text-xs font-bold text-gray-700 hover:bg-indigo-50 flex items-center gap-2 transition border-t border-gray-50">
                        <img src="https://flagcdn.com/w20/gb.png" class="w-4"> EN
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. CARD AUTH -->
    <div class="bg-white w-full max-w-md rounded-[40px] shadow-2xl overflow-hidden relative z-10">
        <!-- Tab Menu -->
        <div class="flex border-b border-gray-100">
            <button onclick="toggleAuth('login')" id="tab-login" class="flex-1 py-5 font-bold text-indigo-600 border-b-2 border-indigo-600 transition uppercase text-sm tracking-widest">Masuk</button>
            <button onclick="toggleAuth('register')" id="tab-register" class="flex-1 py-5 font-bold text-gray-400 hover:text-indigo-600 transition uppercase text-sm tracking-widest">Daftar</button>
        </div>

        <div class="p-8 md:p-10">
            <div class="text-center mb-8">
                <h2 id="auth-title" class="text-3xl font-extrabold text-gray-800 tracking-tight">Selamat Datang!</h2>
                <p id="auth-subtitle" class="text-gray-500 italic text-sm mt-2">Silakan masuk ke akunmu.</p>
            </div>

            <form id="auth-form" class="space-y-5">
                <!-- Input Nama (Muncul saat Daftar) -->
                <div id="name-field" class="hidden">
                    <label id="lbl-name" class="block text-[10px] font-black text-gray-400 ml-1 mb-1 uppercase tracking-widest">Nama Lengkap</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                        <input type="text" id="auth-username" class="w-full pl-12 pr-4 py-4 rounded-2xl border border-gray-100 focus:ring-2 focus:ring-indigo-500 outline-none transition bg-gray-50/50" placeholder="Budi Santoso">
                    </div>
                </div>

                <!-- Input Email -->
                <div>
                    <label id="lbl-email" class="block text-[10px] font-black text-gray-400 ml-1 mb-1 uppercase tracking-widest">Alamat Email</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                        <input type="email" id="auth-email" class="w-full pl-12 pr-4 py-4 rounded-2xl border border-gray-100 focus:ring-2 focus:ring-indigo-500 outline-none transition bg-gray-50/50" placeholder="budi@email.com" required>
                    </div>
                </div>

                <!-- Input Password -->
                <div>
                    <label id="lbl-pass" class="block text-[10px] font-black text-gray-400 ml-1 mb-1 uppercase tracking-widest">Kata Sandi</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                        <input type="password" id="auth-password" class="w-full pl-12 pr-4 py-4 rounded-2xl border border-gray-100 focus:ring-2 focus:ring-indigo-500 outline-none transition bg-gray-50/50" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" id="auth-btn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-[0.2em] hover:shadow-xl hover:shadow-indigo-200 transition transform active:scale-95">
                    Masuk Sekarang
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="pembeli.html" id="link-back" class="text-xs font-bold text-gray-400 hover:text-indigo-600 transition uppercase tracking-widest italic">Kembali ke Beranda</a>
            </div>
        </div>
    </div>

    <script>
        let isLogin = true;

        // --- 1. DATA TRANSLASI ---
        const translations = {
            id: {
                tabIn: "Masuk", tabUp: "Daftar",
                titleIn: "Selamat Datang!", subIn: "Silakan masuk ke akunmu.",
                titleUp: "Buat Akun", subUp: "Bergabunglah dengan YouthMarket.",
                btnIn: "Masuk Sekarang", btnUp: "Daftar Akun Baru",
                lblName: "Nama Lengkap", lblEmail: "Alamat Email", lblPass: "Kata Sandi",
                back: "Kembali ke Beranda", lang: "ID"
            },
            en: {
                tabIn: "Login", tabUp: "Register",
                titleIn: "Welcome Back!", subIn: "Please login to your account.",
                titleUp: "Create Account", subUp: "Join the YouthMarket community.",
                btnIn: "Login Now", btnUp: "Register New Account",
                lblName: "Full Name", lblEmail: "Email Address", lblPass: "Password",
                back: "Back to Home", lang: "EN"
            }
        };

        // --- 2. FUNGSI BAHASA ---
        function applyLanguage() {
            const lang = localStorage.getItem('lang') || 'id';
            const t = translations[lang];

            // Update UI Berdasarkan Status (Login/Register)
            document.getElementById('tab-login').innerText = t.tabIn;
            document.getElementById('tab-register').innerText = t.tabUp;
            document.getElementById('lbl-name').innerText = t.lblName;
            document.getElementById('lbl-email').innerText = t.lblEmail;
            document.getElementById('lbl-pass').innerText = t.lblPass;
            document.getElementById('link-back').innerText = t.back;
            document.getElementById('lang-text').innerText = t.lang;
            document.getElementById('flag-icon').src = lang === 'id' ? 'https://flagcdn.com/w20/id.png' : 'https://flagcdn.com/w20/gb.png';

            if(isLogin) {
                document.getElementById('auth-title').innerText = t.titleIn;
                document.getElementById('auth-subtitle').innerText = t.subIn;
                document.getElementById('auth-btn').innerText = t.btnIn;
            } else {
                document.getElementById('auth-title').innerText = t.titleUp;
                document.getElementById('auth-subtitle').innerText = t.subUp;
                document.getElementById('auth-btn').innerText = t.btnUp;
            }
        }

        function changeLanguage(lang) {
            localStorage.setItem('lang', lang);
            applyLanguage();
        }

        // --- 3. LOGIKA TOGGLE & FORM ---
        function toggleAuth(mode) {
            const nameField = document.getElementById('name-field');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');

            if(mode === 'register') {
                isLogin = false;
                nameField.classList.remove('hidden');
                tabRegister.className = "flex-1 py-5 font-bold text-indigo-600 border-b-2 border-indigo-600 transition uppercase text-sm tracking-widest";
                tabLogin.className = "flex-1 py-5 font-bold text-gray-400 hover:text-indigo-600 transition uppercase text-sm tracking-widest";
            } else {
                isLogin = true;
                nameField.classList.add('hidden');
                tabLogin.className = "flex-1 py-5 font-bold text-indigo-600 border-b-2 border-indigo-600 transition uppercase text-sm tracking-widest";
                tabRegister.className = "flex-1 py-5 font-bold text-gray-400 hover:text-indigo-600 transition uppercase text-sm tracking-widest";
            }
            applyLanguage();
        }

        document.getElementById('auth-form').onsubmit = function(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const username = document.getElementById('auth-username').value;
            let users = JSON.parse(localStorage.getItem('users')) || [];

            if(!isLogin) {
                if(users.find(u => u.email === email)) return alert("Email sudah terdaftar!");
                const newUser = { username, email, password };
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                localStorage.setItem('currentUser', JSON.stringify(newUser));
                alert("Akun berhasil dibuat!");
                window.location.href = 'pembeli.html';
            } else {
                const user = users.find(u => u.email === email && u.password === password);
                if(user) {
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    alert("Berhasil masuk!");
                    window.location.href = 'pembeli.html';
                } else {
                    alert("Email atau password salah!");
                }
            }
        };

        // Jalankan saat load
        window.onload = applyLanguage;
    </script>
</body>
</html>
