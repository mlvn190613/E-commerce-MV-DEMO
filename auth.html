<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Register - YouthMarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
        <!-- Tab Menu -->
        <div class="flex border-b">
            <button onclick="toggleAuth('login')" id="tab-login" class="flex-1 py-4 font-bold text-indigo-600 border-b-2 border-indigo-600 transition">Masuk</button>
            <button onclick="toggleAuth('register')" id="tab-register" class="flex-1 py-4 font-bold text-gray-400 hover:text-indigo-600 transition">Daftar</button>
        </div>

        <div class="p-8">
            <div class="text-center mb-8">
                <h2 id="auth-title" class="text-3xl font-extrabold text-gray-800">Selamat Datang!</h2>
                <p id="auth-subtitle" class="text-gray-500 italic">Silakan masuk ke akunmu.</p>
            </div>

            <form id="auth-form" class="space-y-4">
                <!-- Input Nama (Hanya muncul saat Daftar) -->
                <div id="name-field" class="hidden">
                    <label class="block text-xs font-bold text-gray-400 ml-1 mb-1 uppercase">Nama Lengkap</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-4 text-gray-300"></i>
                        <input type="text" id="auth-username" class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-100 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Budi Santoso">
                    </div>
                </div>

                <!-- Input Email -->
                <div>
                    <label class="block text-xs font-bold text-gray-400 ml-1 mb-1 uppercase">Alamat Email</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-4 text-gray-300"></i>
                        <input type="email" id="auth-email" class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-100 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="budi@email.com" required>
                    </div>
                </div>

                <!-- Input Password -->
                <div>
                    <label class="block text-xs font-bold text-gray-400 ml-1 mb-1 uppercase">Kata Sandi</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-4 text-gray-300"></i>
                        <input type="password" id="auth-password" class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-100 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" id="auth-btn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition transform active:scale-95">
                    Masuk Sekarang
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="index.html" class="text-sm text-gray-400 hover:text-indigo-600 transition">Kembali ke Beranda</a>
            </div>
        </div>
    </div>

    <script>
        let isLogin = true;

        function toggleAuth(mode) {
            const nameField = document.getElementById('name-field');
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const btn = document.getElementById('auth-btn');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');

            if(mode === 'register') {
                isLogin = false;
                nameField.classList.remove('hidden');
                title.innerText = "Buat Akun";
                subtitle.innerText = "Bergabunglah dengan YouthMarket.";
                btn.innerText = "Daftar Akun Baru";
                tabRegister.className = "flex-1 py-4 font-bold text-indigo-600 border-b-2 border-indigo-600 transition";
                tabLogin.className = "flex-1 py-4 font-bold text-gray-400 hover:text-indigo-600 transition";
            } else {
                isLogin = true;
                nameField.classList.add('hidden');
                title.innerText = "Selamat Datang!";
                subtitle.innerText = "Silakan masuk ke akunmu.";
                btn.innerText = "Masuk Sekarang";
                tabLogin.className = "flex-1 py-4 font-bold text-indigo-600 border-b-2 border-indigo-600 transition";
                tabRegister.className = "flex-1 py-4 font-bold text-gray-400 hover:text-indigo-600 transition";
            }
        }

        document.getElementById('auth-form').onsubmit = function(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const username = document.getElementById('auth-username').value;

            // Ambil data user dari localStorage
            let users = JSON.parse(localStorage.getItem('users')) || [];

            if(!isLogin) {
                // LOGIKA DAFTAR
                const existingUser = users.find(u => u.email === email);
                if(existingUser) return alert("Email sudah terdaftar!");

                const newUser = { username, email, password };
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                localStorage.setItem('currentUser', JSON.stringify(newUser));
                alert("Akun berhasil dibuat!");
                window.location.href = 'pembeli.html';
            } else {
                // LOGIKA LOGIN
                const user = users.find(u => u.email === email && u.password === password);
                if(user) {
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    alert("Berhasil masuk!");
                    window.location.href = 'index.html';
                } else {
                    alert("Email atau password salah!");
                }
            }
        };
    </script>
</body>
</html>
